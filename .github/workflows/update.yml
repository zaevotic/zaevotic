---
# GitHub Actions workflow to update SVG status bars nightly and on pushes
# It runs the project's update.py which pulls live GitHub stats and injects them into dark.svg & light.svg.
# The workflow also commits any changes back to the repository.

name: SVG Update
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * *"   # runs daily at 04:00 UTC

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Set up Python 3.8
        uses: actions/setup-python@v4
        with:
          python-version: "3.8"

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('cache/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: python -m pip install -r cache/requirements.txt

      - name: Run SVG updater
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ${{ secrets.USER_NAME }}
        run: python update.py

      - name: Commit and push changes
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add dark.svg light.svg cache/*.txt || true
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update SVG status bars" -a
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
