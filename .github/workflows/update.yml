---
# GitHub Actions workflow to update SVG status bars nightly and on pushes
# It runs the project's update.py which pulls live GitHub stats and injects them into dark.svg & light.svg.
# The workflow also commits any changes back to the repository.

name: SVG Update
on:
  push:
    branches: [main]
    schedule:
    - cron: "0 4 * * *"
    workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('cache/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: python -m pip install -r cache/requirements.txt

      - name: Run SVG updater
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ${{ secrets.USER_NAME }}
        run: python update.py
      
      - name: Inspect File Changes
        run: |
          echo "Checking modification times..."
          ls -l dark.svg light.svg
          echo "Git status..."
          git status
          echo "Content diff..."
          git diff --stat

      - name: Commit and push changes
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add dark.svg light.svg cache/*.txt || true
          git commit -m "workflow: SVG files updated" -a || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
